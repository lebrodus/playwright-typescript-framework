name: Bug report
description: Report a failing test or framework defect
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npm run test:e2e`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: dropdown
    id: suite
    attributes:
      label: Affected suite
      options: [e2e, api, web, a11y, visual, framework/config, ci]
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: 'OS, Node version, browser, Playwright version'
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / trace
      description: Paste relevant output or attach the Playwright trace.
      render: shell
